<!DOCTYPE html>
<html>
<head>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center; 
            align-items: center;
            background-color: #4bb0c9;
            
        }

        .login {
            background: #e5e5e5;
            padding: 30px;
            width: 300px;
            text-align: center;
        }

        h3 {
            color: #4bb0c9;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #4bb0c9;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #3999af;
        }
    </style>
</head>
<body>

    <div class="login">
        <h3>Login To Your Account</h3>
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
        <button>Login</button>
    </div>

</body>
</html>

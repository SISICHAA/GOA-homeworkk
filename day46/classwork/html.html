<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>ღილაკები</title>
    <style>
        button {
            margin: 10px;
            border: 2px solid black;
            background-color: lightblue;
            cursor: pointer;
        }

        .btn1 {
            padding: 40px;
        }

        
        .btn2 {
            padding: 30px 20px;
        }

       
        .btn3 {
            padding: 10px 20px 50px 100px;
        }
        .btn4 {
            padding-bottom: 50px;
        }
    </style>
</head>
<body>

    <button class="btn1">ღილაკი 1</button>
    <button class="btn2">ღილაკი 2</button>
    <button class="btn3">ღილაკი 3</button>
    <button class="btn4">ღილაკი 4</button>

</body>
</html>

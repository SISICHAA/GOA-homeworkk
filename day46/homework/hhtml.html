<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>Div დავალება</title>
    <style>
        div {
            margin: 20px;
        }

        /* 1 */
        .div1 {
            border: 2px solid black;
            padding: 100px;
        }

        /* 2*/
        .div2 {
            border: 2px solid black;
            padding: 200px 100px;
        }

        .div2 button {
            padding: 20px 34px;
        }

        /* 3*/
        .div3 {
            border: 2px solid black;
            padding: 30px 50px 90px 100px;
        }

        .div3 img {
            width: 100px;
        }

        /* 4*/
        .div4 {
            border: 2px solid black;
            padding-bottom: 100px;
        }

        .div4 button {
            padding-bottom: 30px;
        }

        /*  5 */
    .input1 {
        border: 5px solid green;
        display: block;
        margin-bottom: 30px;
    }

        /* 6  */
    .input2 {
        width: 300px;
        height: 50px;
        background-color: lightgray;

        border-top: 5px solid red;
        border-right: 5px dashed blue;
        border-bottom: 5px dotted green;
        border-left: 5px double orange;

        display: block;
        margin-bottom: 30px;
    }

        /*  7 */
    .btn1 {
        padding: 40px 50px;

        border-top: 5px solid red;
        border-right: 5px solid blue;
        border-bottom: 5px solid green;
        border-left: 5px solid orange;

        margin: 148px;
    }

        /*  8  */
    .btn2 {
        padding: 40px;

        border: 4px solid green;

        margin: 140px 30px;
    }

    /* 9  */
    .btn3 {
        padding: 20px 100px;

        border: 10px dashed red;

        margin: 150px 200px 40px 121px;
    }

    .h1-task9 {
        margin-top: 95px;
    }

    /* 10  */
    .btn4 {
        padding-bottom: 40px;

        border: 8px dotted blue;
        border-radius: 10px;

        margin-bottom: 140px;
    }

    .p-task10 {
        margin: 100px 0;
    }
    </style>
</head>
<body>

    <!-- 1 -->
    <div class="div1">
        ეს არის ტექსტი
    </div>

    <!-- 2 -->
    <div class="div2">
        <button>ღილაკი</button>
    </div>

    <!-- 3 -->
    <div class="div3">
        <img src="car.jpg" alt="photo">
    </div>

    <!-- 4 -->
    <div class="div4">
        <button>ღილაკი</button>
    </div>


    <!-- 5 -->
    
    <input class="input1" type="text" placeholder="Task 5">

    <!-- 6 -->
    
    <input class="input2" type="text" placeholder="Task 6">

    <!-- 7 -->
    
    <h1>სათაური</h1>
    <p>ეს არის პარაგრაფი</p>
    <button class="btn1">ღილაკი</button>

    <!-- 8 -->
    
    <h1>სათაური</h1>
    <p>ეს არის პარაგრაფი</p>
    <button class="btn2">ღილაკი</button>

    <!-- 9 -->
    
    <h1 class="h1-task9">სათაური</h1>
    <p>ეს არის პარაგრაფი</p>
    <button class="btn3">ღილაკი</button>

    <!-- 10 -->
    
    <h1>სათაური</h1>
    <p class="p-task10">ეს არის პარაგრაფი</p>
    <button class="btn4">ღილაკი</button>

</body>
</html>
